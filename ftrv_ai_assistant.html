<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FTRV Lot Assistant — Texarkana</title>
<style>
:root {
  --red: #c0392b;
  --red-soft: #e05548;
  --bg: #0a0a0b;
  --surface: #121214;
  --card: #151517;
  --border: #232327;
  --border-hover: #3a3a40;
  --text: #f2f2f3;
  --muted: #8a8a93;
  --faint: #55555e;
  --green: #4cc38a;
  --amber: #d4a72c;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.hicon {
  width: 4px;
  height: 26px;
  background: var(--red);
  border-radius: 2px;
  flex-shrink: 0;
}
.htitle { flex: 1; }
.htitle h1 { font-size: .95rem; font-weight: 600; letter-spacing: .4px; }
.htitle .sub { font-size: .62rem; color: var(--muted); letter-spacing: 2.2px; text-transform: uppercase; margin-top: 2px; }
.hbadge {
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 12px;
  font-size: .72rem;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
}

/* QUICK CHIPS */
.chips {
  display: flex;
  gap: 8px;
  padding: 12px 18px;
  overflow-x: auto;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: .74rem;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .15s, color .15s;
}
.chip:hover, .chip:active { border-color: var(--red-soft); color: var(--text); }

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
#chat::-webkit-scrollbar { width: 8px; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }

.msg { max-width: 88%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 10px 14px;
  font-size: .86rem;
  line-height: 1.55;
  border-radius: 10px;
}
.msg.ai .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}
.msg.user .bubble {
  background: var(--red);
  color: #fff;
  font-weight: 500;
}
.bubble strong { font-weight: 700; }

/* TYPING */
.typing { display: flex; gap: 4px; align-items: center; padding: 10px 12px; }
.dot { width: 6px; height: 6px; background: var(--faint); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* UNIT CARDS */
.cards-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 10px;
}

.unit-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .15s;
}
.unit-card:hover { border-color: var(--border-hover); }

/* PHOTO AREA */
.card-photo {
  height: 150px;
  position: relative;
  overflow: hidden;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-photo img.loading { display: none; }
.card-photo img.error { display: none; }
.photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.photo-placeholder .icon { display: none; }
.photo-placeholder .lbl { font-size: .68rem; color: var(--faint); letter-spacing: 1px; text-transform: uppercase; }
.photo-overlay {
  position: absolute;
  top: 8px; left: 8px;
  display: flex; gap: 6px;
}

/* CARD BODY */
.card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 9px; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-stock { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: .3px; }
.card-year { font-size: .74rem; color: var(--muted); font-weight: 500; margin-top: 1px; }

.card-model { font-size: .87rem; color: var(--text); line-height: 1.4; font-weight: 500; }

.card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.badge {
  padding: 2px 9px;
  border-radius: 4px;
  font-size: .62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: transparent;
}
.b-new   { border-color: rgba(76,195,138,.4); color: var(--green); }
.b-used  { border-color: rgba(212,167,44,.4); color: var(--amber); }
.b-tt, .b-fw, .b-th, .b-dt { border-color: var(--border); color: var(--muted); }

.card-price { font-size: 1.2rem; font-weight: 700; color: var(--green); letter-spacing: .2px; }
.card-price.call { color: var(--muted); font-size: .85rem; font-weight: 500; }

.card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-action {
  flex: 1;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: .76rem;
  font-weight: 600;
  letter-spacing: .3px;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all .15s;
  min-width: 100px;
  background: transparent;
}
.btn-view {
  border: 1px solid var(--red);
  color: var(--red-soft);
}
.btn-view:hover { background: var(--red); color: #fff; }
.btn-copy {
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-copy:hover { border-color: var(--border-hover); color: var(--text); }
.btn-copy.copied { border-color: rgba(76,195,138,.5); color: var(--green); }

/* INPUT */
.input-row {
  display: flex;
  gap: 10px;
  padding: 12px 18px 14px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#userInput {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-size: .9rem;
  outline: none;
  resize: none;
  max-height: 100px;
  font-family: inherit;
  transition: border-color .15s;
}
#userInput:focus { border-color: var(--red); }
#userInput::placeholder { color: var(--faint); }
#sendBtn {
  background: var(--red);
  border: none;
  color: #fff;
  border-radius: 10px;
  width: 44px;
  height: 44px;
  font-size: 1.05rem;
  cursor: pointer;
  flex-shrink: 0;
  align-self: flex-end;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
#sendBtn:hover { background: #a93226; }
#sendBtn:disabled { opacity: .35; cursor: default; }

@media (max-width: 480px) {
  .msg { max-width: 95%; }
  .card-photo { height: 140px; }
}
</style>
</head>
<body>

<header>
  <div class="hicon"></div>
  <div class="htitle">
    <h1>FTRV Lot Assistant</h1>
    <div class="sub">Fun Town RV · Texarkana</div>
  </div>
  <div class="hbadge" id="unitBadge">— units</div>
</header>

<div class="chips" id="chips">
  <div class="chip" onclick="ask('Family of 6 with a budget around $30k')">Family $30k</div>
  <div class="chip" onclick="ask('Couples coach, compact, under 25ft')">Couples</div>
  <div class="chip" onclick="ask('Used units under $25k')">Used &lt; $25k</div>
  <div class="chip" onclick="ask('Bunkhouse that sleeps 8 or more')">Bunks 8+</div>
  <div class="chip" onclick="ask('Fifth wheels with multiple slides')">5th w/ slides</div>
  <div class="chip" onclick="ask('Toy haulers in stock')">Toy Haulers</div>
  <div class="chip" onclick="ask('Lightweight travel trailers under 5000 lbs')">Lightweight</div>
  <div class="chip" onclick="ask('What fifth wheels are over $100k?')">Premium 5th</div>
  <div class="chip" onclick="ask('Destination trailers')">Destination</div>
  <div class="chip" onclick="ask('What new units came in this week?')">New arrivals</div>
  <div class="chip" onclick="ask('Show me all units with 1.5 bathrooms')">1.5 Bath</div>
  <div class="chip" onclick="ask('Show me all units with 2 full bathrooms')">2 Bath</div>
</div>

<div id="chat"></div>

<div class="input-row">
  <textarea id="userInput" placeholder="What does the customer need — budget, size, features, stock #" rows="1"></textarea>
  <button id="sendBtn" onclick="sendMsg()">→</button>
</div>

<script src="ftrv_shared.js?v=20260705f"></script>
<script>
// ─── INVENTORY ───────────────────────────────────────────────────────────────
// Inventory comes from arklatexrv.com/inventory.json via inventoryReady in ftrv_shared.js

// SYSTEM_TEMPLATE, BOOL_FILTER_FIELDS, applyFilterSpec, applySort → ftrv_shared.js

// ─── CHAT STATE ───────────────────────────────────────────────────────────────
let conversation = [];

// ─── RENDER ───────────────────────────────────────────────────────────────────
function typeBadgeClass(type) {
  if (type === 'Travel Trailer') return 'b-tt';
  if (type === 'Fifth Wheel')    return 'b-fw';
  if (type === 'Toy Hauler')     return 'b-th';
  if (type === 'Destination Trailer') return 'b-dt';
  return 'b-tt';
}
function typeShort(type) {
  if (type === 'Travel Trailer') return 'Travel Trailer';
  if (type === 'Fifth Wheel')    return 'Fifth Wheel';
  if (type === 'Toy Hauler')     return 'Toy Hauler';
  if (type === 'Destination Trailer') return 'Destination';
  return type;
}

function renderCards(stocks) {
  const units = stocks.map(s => INVENTORY.find(u => u.stock === s)).filter(Boolean);
  if (!units.length) return '';

  const cardsHTML = units.map(u => {
    const searchUrl = u.detailUrl || `https://www.funtownrv.com/rv-search?s=true&lots=1695&q=${encodeURIComponent(u.stock)}`;
    const priceHTML = u.price === 'Call'
      ? `<div class="card-price call">Call for Price</div>`
      : `<div class="card-price">${u.price}</div>`;
    const photoHTML = u.photoUrl
      ? '<img src="' + u.photoUrl + '" alt="' + u.brandModel.replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=&quot;photo-placeholder&quot;><div class=&quot;lbl&quot;>No photo</div></div>\'">'
      : '<div class="photo-placeholder"><div class="lbl">No photo</div></div>';

    return `<div class="unit-card">
      <div class="card-photo">
        ${photoHTML}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-stock">#${u.stock}</div>
            <div class="card-year">${u.year}</div>
          </div>
          <div class="card-badges" style="text-align:right">
            <span class="badge ${u.condition === 'New' ? 'b-new' : 'b-used'}">${u.condition}</span>
          </div>
        </div>
        <div class="card-model">${u.brandModel}</div>
        <div class="card-badges">
          <span class="badge ${typeBadgeClass(u.type)}">${typeShort(u.type)}</span>
          ${u.layout ? `<span class="badge">${u.layout}</span>` : ''}
        </div>
        ${priceHTML}
        <div class="card-actions">
          ${u.detailUrl ? `<button class="btn-action btn-view" onclick="showFloorplan('${u.stock}','${u.detailUrl}')">Floor Plan</button>` : `<a class="btn-action btn-view" href="https://www.funtownrv.com/rv-search?s=true&lots=1695&q=${encodeURIComponent(u.stock)}" target="_blank">Search Unit</a>`}
          <button class="btn-action btn-copy" onclick="copyStock(this, '${u.stock}')">Copy #${u.stock}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="cards-row">${cardsHTML}</div>`;
}

function copyStock(btn, stock) {
  navigator.clipboard.writeText(stock).catch(() => {});
  btn.textContent = 'Copied';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'Copy #' + stock;
    btn.classList.remove('copied');
  }, 1800);
}

// ─── FLOOR PLAN MODAL ─────────────────────────────────────────────────────────
function showFloorplan(stock, productUrl) {
  const unit = INVENTORY.find(u => u.stock === stock);
  const name = unit ? unit.brandModel : stock;

  // Create or reuse modal
  let modal = document.getElementById('fp-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'fp-modal';
    modal.innerHTML = `
      <div id="fp-backdrop" onclick="closeFpModal()"></div>
      <div id="fp-box">
        <div id="fp-header">
          <span id="fp-title"></span>
          <div style="display:flex;gap:8px;align-items:center">
            <a id="fp-link" href="#" target="_blank" style="font-size:.75rem;color:#8a8a93;text-decoration:none">Open on funtownrv.com ↗</a>
            <button onclick="closeFpModal()" style="background:none;border:none;color:#8a8a93;font-size:1.4rem;cursor:pointer;line-height:1">×</button>
          </div>
        </div>
        <div id="fp-body">
          <div id="fp-spinner">Loading floor plan…</div>
          <img id="fp-img" style="display:none;max-width:100%;max-height:70vh;border-radius:6px" />
          <div id="fp-err" style="display:none;color:#8a8a93;text-align:center;padding:24px">Floor plan image not available for this unit.<br><br><a href="#" id="fp-fallback" target="_blank" style="color:#e05548">View full listing ↗</a></div>
        </div>
      </div>`;
    modal.style.cssText = 'display:none;position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center';
    document.body.appendChild(modal);
    document.getElementById('fp-backdrop').style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,.8)';
    document.getElementById('fp-box').style.cssText = 'position:relative;background:#151517;border:1px solid #232327;border-radius:12px;width:min(600px,95vw);max-height:90vh;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px';
    document.getElementById('fp-header').style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
    document.getElementById('fp-title').style.cssText = 'font-weight:600;font-size:.95rem;color:#f2f2f3';
    document.getElementById('fp-spinner').style.cssText = 'text-align:center;padding:32px;color:#8a8a93';
  }

  // Set title/link
  document.getElementById('fp-title').textContent = `#${stock} – ${name}`;
  document.getElementById('fp-link').href = productUrl;
  document.getElementById('fp-fallback').href = productUrl;

  // Show modal with spinner
  modal.style.display = 'flex';
  document.getElementById('fp-spinner').style.display = 'block';
  document.getElementById('fp-img').style.display = 'none';
  document.getElementById('fp-err').style.display = 'none';

  // Fetch floor plan via proxy
  fetch(`/api/floorplan?url=${encodeURIComponent(productUrl)}`)
    .then(r => r.json())
    .then(data => {
      if (data.floorplanUrl) {
        const img = document.getElementById('fp-img');
        img.onload = () => {
          document.getElementById('fp-spinner').style.display = 'none';
          img.style.display = 'block';
        };
        img.onerror = () => {
          document.getElementById('fp-spinner').style.display = 'none';
          document.getElementById('fp-err').style.display = 'block';
        };
        img.src = data.floorplanUrl;
      } else {
        document.getElementById('fp-spinner').style.display = 'none';
        document.getElementById('fp-err').style.display = 'block';
      }
    })
    .catch(() => {
      document.getElementById('fp-spinner').style.display = 'none';
      document.getElementById('fp-err').style.display = 'block';
    });
}

function closeFpModal() {
  const m = document.getElementById('fp-modal');
  if (m) m.style.display = 'none';
}

function addMessage(role, text, stocks = []) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  let inner = `<div class="bubble">${formatted}</div>`;
  if (stocks.length) inner += renderCards(stocks);

  div.innerHTML = inner;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
// Facts-only output (Steve, 2026-07-05: "no explaining no words just facts and
// results"). The AI is ONLY a query translator; the bubble text is built
// deterministically from the executed filter — count + describeFilterSpec.
async function sendMsg() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  try { await inventoryReady; } catch(e) { addMessage('ai', 'Inventory not loaded: ' + (e.message || e)); return; }

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });
  showTyping();

  let factsLine = '', stocks = [], matchCount = 0;
  let assistantReply = '';

  try {
    // callChat lives in ftrv_shared.js — handles API shape, prompt caching, JSON extraction.
    const result = await callChat(conversation.slice(-10));
    const filterSpec = result.spec;
    const sortBy = result.sortBy;
    const sortDir = result.sortDir;
    const limit = result.limit;

    let list = [];
    let fb = null;
    if (!result.noMatch) {
      const res = applyFilterSpecWithFallback(filterSpec, INVENTORY);
      list = res.units;
      fb = res.fallback;
    }
    if (sortBy) list = applySort(list, sortBy, sortDir);
    if (limit) list = list.slice(0, limit);
    matchCount = list.length;
    // Real matches: show ALL (Steve 2026-07-05). Fallback near-misses: cap at 8
    // — they didn't meet the ask; a wall of 95 cards is noise, not results.
    stocks = (fb ? list.slice(0, 8) : list).map(u => u.stock);

    const desc = describeFilterSpec(filterSpec, sortBy, sortDir, limit);
    if (result.noMatch) {
      factsLine = '**0 units**';
    } else if (fb) {
      // Plain-English near-miss line (Steve 2026-07-05: no code words like maxPrice)
      const d = String(fb.dropped);
      const v = fb.dropped_value;
      let reason;
      if (d === 'maxPrice')       reason = 'over the ' + (v ? '$' + v.toLocaleString() : 'price') + ' cap';
      else if (d === 'maxWt')     reason = 'over the ' + (v ? v.toLocaleString() + ' lb' : 'weight') + ' cap';
      else if (d === 'maxLen')    reason = 'over the ' + (v ? v + ' ft' : 'length') + ' cap';
      else if (d === 'minSlp')    reason = 'sleeping fewer than ' + (v || 'asked');
      else if (d === 'minBths')   reason = 'with fewer baths';
      else if (d === 'minGarage') reason = 'with a shorter garage';
      else if (d === 'elecAmp')   reason = 'ignoring the amp requirement';
      else if (d === 'hitch')     reason = 'ignoring hitch type';
      else if (d === 'type')      reason = 'ignoring RV type';
      else if (d === 'condition') reason = 'ignoring new/used';
      else if (d.indexOf('feature ') === 0) reason = 'without ' + d.slice(8);
      else if (d.indexOf('flag ') === 0)    reason = 'without ' + d.slice(5).replace(/_/g, ' ');
      else reason = 'ignoring ' + d.replace(/_/g, ' ');
      const shown = Math.min(matchCount, 8);
      factsLine = '**0** exact — closest ' + shown + ' of **' + matchCount + '** (' + reason + ')' + (desc ? ' · ' + desc : '');
    } else {
      factsLine = '**' + matchCount + '** unit' + (matchCount === 1 ? '' : 's') + (desc ? ' · ' + desc : '');
    }

    // For conversation history, store the original spec as JSON so context flows
    assistantReply = JSON.stringify({filter: filterSpec, sortBy, sortDir, limit, noMatch: result.noMatch, count: matchCount});
  } catch (err) {
    removeTyping();
    addMessage('ai', "Couldn't parse that — try plain terms (e.g. 'fifth wheel under 60k with a king bed').");
    btn.disabled = false;
    input.focus();
    return;
  }

  removeTyping();
  addMessage('ai', factsLine, stocks);
  if (assistantReply) conversation.push({ role: 'assistant', content: assistantReply });

  btn.disabled = false;
  input.focus();
}

function ask(q) {
  document.getElementById('userInput').value = q;
  sendMsg();
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
const input = document.getElementById('userInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});

// ─── WELCOME ──────────────────────────────────────────────────────────────────
// Wait for inventoryReady so the count is real, not 0 (C2 fix)
inventoryReady.then(() => {
  addMessage('ai', `**${INVENTORY.length} units** loaded. Type what the customer needs — budget, size, features, or a stock #.`);
}).catch(() => {
  addMessage('ai', `Inventory still loading — give it a moment, then ask.`);
});
</script>
</body>
</html>
