<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FTRV Lot Assistant — Texarkana</title>
<style>
:root {
  --red: #c0392b;
  --red2: #8b0000;
  --dark: #0d1117;
  --mid: #161b22;
  --card: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --green: #3fb950;
  --gold: #f0b429;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --orange: #ffa657;
  --teal: #39d3c3;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--dark);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, var(--red), var(--red2));
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
}
.hicon { font-size: 1.5rem; }
.htitle { flex: 1; }
.htitle h1 { font-size: 1rem; font-weight: 700; letter-spacing: .3px; }
.htitle .sub { font-size: .7rem; opacity: .75; letter-spacing: .5px; }
.hbadge {
  background: rgba(255,255,255,.2);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: .72rem;
  font-weight: 700;
  white-space: nowrap;
}

/* QUICK CHIPS */
.chips {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  background: var(--mid);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--dark);
  color: var(--muted);
  font-size: .75rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.chip:hover, .chip:active { border-color: var(--red); color: var(--text); background: rgba(192,57,43,.15); }

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.msg { max-width: 88%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 4px 14px 14px 14px;
  font-size: .875rem;
  line-height: 1.55;
}
.msg.ai .bubble {
  background: var(--mid);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
}
.msg.user .bubble {
  background: var(--red);
  border-radius: 14px 4px 14px 14px;
  font-weight: 500;
}
.bubble strong { font-weight: 700; }

/* TYPING */
.typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
.dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* UNIT CARDS */
.cards-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}

.unit-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .15s;
}
.unit-card:hover { border-color: var(--red); }

/* PHOTO AREA */
.card-photo {
  height: 160px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #1c2333, #0d1117);
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-photo img.loading { display: none; }
.card-photo img.error { display: none; }
.photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: .4;
}
.photo-placeholder .icon { font-size: 2.5rem; }
.photo-placeholder .lbl { font-size: .7rem; color: var(--muted); }
.photo-overlay {
  position: absolute;
  top: 8px; left: 8px;
  display: flex; gap: 6px;
}

/* CARD BODY */
.card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-stock { font-size: 1.05rem; font-weight: 800; color: #fff; }
.card-year { font-size: .8rem; color: var(--gold); font-weight: 600; }

.card-model { font-size: .88rem; color: var(--text); line-height: 1.35; font-weight: 500; }

.card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.badge {
  padding: 2px 9px;
  border-radius: 10px;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.b-new   { background: rgba(63,185,80,.15); color: #3fb950; border: 1px solid rgba(63,185,80,.4); }
.b-used  { background: rgba(240,180,41,.15); color: #f0b429; border: 1px solid rgba(240,180,41,.4); }
.b-tt    { background: rgba(88,166,255,.12); color: #58a6ff; border: 1px solid rgba(88,166,255,.3); }
.b-fw    { background: rgba(188,140,255,.12); color: #bc8cff; border: 1px solid rgba(188,140,255,.3); }
.b-th    { background: rgba(255,166,87,.12);  color: #ffa657; border: 1px solid rgba(255,166,87,.3); }
.b-dt    { background: rgba(57,211,195,.12);  color: #39d3c3; border: 1px solid rgba(57,211,195,.3); }

.card-price { font-size: 1.15rem; font-weight: 800; color: var(--green); }
.card-price.call { color: var(--muted); font-size: .9rem; font-weight: 500; font-style: italic; }

.card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-action {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  border: none;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all .15s;
  min-width: 100px;
}
.btn-view {
  background: var(--red);
  color: #fff;
}
.btn-view:hover { background: #a93226; }
.btn-copy {
  background: var(--mid);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-copy:hover { border-color: var(--red); }
.btn-copy.copied { background: rgba(63,185,80,.2); border-color: var(--green); color: var(--green); }

/* INPUT */
.input-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--mid);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#userInput {
  flex: 1;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--text);
  font-size: .9rem;
  outline: none;
  resize: none;
  max-height: 100px;
  font-family: inherit;
}
#userInput:focus { border-color: var(--red); }
#userInput::placeholder { color: var(--muted); }
#sendBtn {
  background: var(--red);
  border: none;
  color: #fff;
  border-radius: 12px;
  width: 44px;
  height: 44px;
  font-size: 1.1rem;
  cursor: pointer;
  flex-shrink: 0;
  align-self: flex-end;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
#sendBtn:hover { background: #a93226; }
#sendBtn:disabled { opacity: .4; cursor: default; }

@media (max-width: 480px) {
  .msg { max-width: 95%; }
  .card-photo { height: 140px; }
}
</style>
</head>

  const priceNum = price ? parseInt(price.replace(/[^0-9]/g,'')) || 0 : 0;
  return { stock, year: parseInt(year)||0, type, condition, price: price||'Call', priceNum, brandModel, photoUrl };
});

const invText = INVENTORY.map(u =>

CURRENT INVENTORY (${INVENTORY.length} units) — format: stock|year|type|condition|price|brand+model:
${invText}

RESPONSE FORMAT:
1. Write a helpful, conversational response (2-4 sentences max). Be specific — mention unit names, stock numbers, and prices from the inventory.

MATCHING RULES:

- For family/bunkhouse requests: prioritize bunkhouse floorplans (BH, DBH, etc.) and larger sleeps
- For couples: prioritize RK (rear kitchen), smaller footprint, single slide
- For toy haulers: only match Toy Hauler type units
- For specific stock lookups: match that exact stock number

// ─── RENDER ───────────────────────────────────────────────────────────────────
function typeBadgeClass(type) {
  if (type === 'Travel Trailer') return 'b-tt';
  if (type === 'Fifth Wheel')    return 'b-fw';
  if (type === 'Toy Hauler')     return 'b-th';
  if (type === 'Destination Trailer') return 'b-dt';
  return 'b-tt';
}
function typeShort(type) {
  if (type === 'Travel Trailer') return 'Travel Trailer';
  if (type === 'Fifth Wheel')    return 'Fifth Wheel';
  if (type === 'Toy Hauler')     return 'Toy Hauler';
  if (type === 'Destination Trailer') return 'Destination';
  return type;
}

function renderCards(stocks) {
  const units = stocks.map(s => INVENTORY.find(u => u.stock === s)).filter(Boolean);
  if (!units.length) return '';

  const cardsHTML = units.map(u => {
    const searchUrl = `https://www.funtownrv.com/rv-search?s=true&lots=1695&q=${encodeURIComponent(u.stock)}`;
    const priceHTML = u.price === 'Call'
      ? `<div class="card-price call">Call for Price</div>`
      : `<div class="card-price">${u.price}</div>`;
    const photoHTML = u.photoUrl
      ? '<img src="' + u.photoUrl + '" alt="' + u.brandModel.replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=&quot;photo-placeholder&quot;><div class=&quot;icon&quot;>\u{1F690}</div></div>\'">'
      : '<div class="photo-placeholder"><div class="icon">🚐</div><div class="lbl">No photo available</div></div>';

    return `<div class="unit-card">
      <div class="card-photo">
        ${photoHTML}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-stock">#${u.stock}</div>
            <div class="card-year">${u.year}</div>
          </div>
          <div class="card-badges" style="text-align:right">
            <span class="badge ${u.condition === 'New' ? 'b-new' : 'b-used'}">${u.condition}</span>
          </div>
        </div>
        <div class="card-model">${u.brandModel}</div>
        <div class="card-badges">
          <span class="badge ${typeBadgeClass(u.type)}">${typeShort(u.type)}</span>
        </div>
        ${priceHTML}
        <div class="card-actions">
          <a class="btn-action btn-view" href="${searchUrl}" target="_blank">📷 Photos &amp; Floor Plan</a>
          <button class="btn-action btn-copy" onclick="copyStock(this, '${u.stock}')">📋 Copy #${u.stock}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="cards-row">${cardsHTML}</div>`;
}

function copyStock(btn, stock) {
  navigator.clipboard.writeText(stock).catch(() => {});
  btn.textContent = '✅ Copied!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '📋 Copy #' + stock;
    btn.classList.remove('copied');
  }, 1800);
}

function addMessage(role, text, stocks = []) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  let inner = `<div class="bubble">${formatted}</div>`;
  if (stocks.length) inner += renderCards(stocks);

  div.innerHTML = inner;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        system: SYSTEM,
        messages: conversation.slice(-10)
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Something went wrong — try again.';

    // Extract matches JSON
    const jsonMatch = reply.match(/\{"matches"\s*:\s*\[([^\]]*)\]\}/);
    let stocks = [];
    let cleanText = reply;
    if (jsonMatch) {
      cleanText = reply.replace(jsonMatch[0], '').trim();
      stocks = (jsonMatch[1].match(/"([^"]+)"/g) || []).map(s => s.replace(/"/g, ''));
    }

    removeTyping();
    addMessage('ai', cleanText, stocks);
    conversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    addMessage('ai', '⚠️ Connection error: ' + err.message + '. Check your network and try again.');
  }

  btn.disabled = false;
  input.focus();
}

function ask(q) {
  document.getElementById('userInput').value = q;
  sendMsg();
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
const input = document.getElementById('userInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
