<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FTRV AI Chat — Texarkana (v8)</title>
<style>
:root {
  --red: #c0392b;
  --red2: #8b0000;
  --dark: #0d1117;
  --mid: #161b22;
  --card: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --green: #3fb950;
  --gold: #f0b429;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --orange: #ffa657;
  --teal: #39d3c3;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--dark);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, var(--red), var(--red2));
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
}
.hicon { font-size: 1.5rem; }
.htitle { flex: 1; }
.htitle h1 { font-size: 1rem; font-weight: 700; letter-spacing: .3px; }
.htitle .sub { font-size: .7rem; opacity: .75; letter-spacing: .5px; }
.hbadge {
  background: rgba(255,255,255,.2);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: .72rem;
  font-weight: 700;
  white-space: nowrap;
}

/* QUICK CHIPS */
.chips {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  background: var(--mid);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--dark);
  color: var(--muted);
  font-size: .75rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.chip:hover, .chip:active { border-color: var(--red); color: var(--text); background: rgba(192,57,43,.15); }

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.msg { max-width: 88%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 4px 14px 14px 14px;
  font-size: .875rem;
  line-height: 1.55;
}
.msg.ai .bubble {
  background: var(--mid);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
}
.msg.user .bubble {
  background: var(--red);
  border-radius: 14px 4px 14px 14px;
  font-weight: 500;
}
.bubble strong { font-weight: 700; }

/* TYPING */
.typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
.dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* UNIT CARDS */
.cards-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}

.unit-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .15s;
}
.unit-card:hover { border-color: var(--red); }

/* PHOTO AREA */
.card-photo {
  height: 160px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #1c2333, #0d1117);
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-photo img.loading { display: none; }
.card-photo img.error { display: none; }
.photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: .4;
}
.photo-placeholder .icon { font-size: 2.5rem; }
.photo-placeholder .lbl { font-size: .7rem; color: var(--muted); }
.photo-overlay {
  position: absolute;
  top: 8px; left: 8px;
  display: flex; gap: 6px;
}

/* CARD BODY */
.card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-stock { font-size: 1.05rem; font-weight: 800; color: #fff; }
.card-year { font-size: .8rem; color: var(--gold); font-weight: 600; }

.card-model { font-size: .88rem; color: var(--text); line-height: 1.35; font-weight: 500; }

.card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.badge {
  padding: 2px 9px;
  border-radius: 10px;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.b-new   { background: rgba(63,185,80,.15); color: #3fb950; border: 1px solid rgba(63,185,80,.4); }
.b-used  { background: rgba(240,180,41,.15); color: #f0b429; border: 1px solid rgba(240,180,41,.4); }
.b-tt    { background: rgba(88,166,255,.12); color: #58a6ff; border: 1px solid rgba(88,166,255,.3); }
.b-fw    { background: rgba(188,140,255,.12); color: #bc8cff; border: 1px solid rgba(188,140,255,.3); }
.b-th    { background: rgba(255,166,87,.12);  color: #ffa657; border: 1px solid rgba(255,166,87,.3); }
.b-dt    { background: rgba(57,211,195,.12);  color: #39d3c3; border: 1px solid rgba(57,211,195,.3); }

.card-price { font-size: 1.15rem; font-weight: 800; color: var(--green); }
.card-price.call { color: var(--muted); font-size: .9rem; font-weight: 500; font-style: italic; }

.card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-action {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  border: none;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all .15s;
  min-width: 100px;
}
.btn-view {
  background: var(--red);
  color: #fff;
}
.btn-view:hover { background: #a93226; }
.btn-copy {
  background: var(--mid);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-copy:hover { border-color: var(--red); }
.btn-copy.copied { background: rgba(63,185,80,.2); border-color: var(--green); color: var(--green); }

/* INPUT */
.input-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--mid);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#userInput {
  flex: 1;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--text);
  font-size: .9rem;
  outline: none;
  resize: none;
  max-height: 100px;
  font-family: inherit;
}
#userInput:focus { border-color: var(--red); }
#userInput::placeholder { color: var(--muted); }
#sendBtn {
  background: var(--red);
  border: none;
  color: #fff;
  border-radius: 12px;
  width: 44px;
  height: 44px;
  font-size: 1.1rem;
  cursor: pointer;
  flex-shrink: 0;
  align-self: flex-end;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
#sendBtn:hover { background: #a93226; }
#sendBtn:disabled { opacity: .4; cursor: default; }

@media (max-width: 480px) {
  .msg { max-width: 95%; }
  .card-photo { height: 140px; }
}
</style>

// ─── LAYOUT DETECTION ─────────────────────────────────────────────────────────
function getLayout(brandModel) {
  const m = brandModel.toUpperCase();
  // Check model suffix patterns
  if (/\b\d*FL\b/.test(m) || /FRONT.?LIV/i.test(m))         return 'Front Living';
  if (/\b\d*RL[BST]?\b/.test(m) || /REAR.?LIV/i.test(m))    return 'Rear Living';
  if (/\b\d*(RK|RKFB|RKS|RKT)\b/.test(m))                    return 'Rear Kitchen';
  if (/\b\d*(FK[DK]?|FKW)\b/.test(m))                        return 'Front Kitchen';
  if (/\b\d*(MK|MKT|MKS)\b/.test(m))                         return 'Mid Kitchen';
  if (/\b\d*(QUAD)\b/.test(m) || /4.?BEDROOM/i.test(m))      return 'Quad/4-Bedroom';
  if (/\b\d*(TB|TBH|3BH)\b/.test(m))                         return 'Triple Bunk';
  if (/\b\d*(DBH|DB[SL]?|DBLE)\b/.test(m))                   return 'Double Bunk';
  if (/\b\d*(BH[SLF]?|BHS|BHK|BHSL|BHKSE)\b/.test(m))       return 'Bunkhouse';
  if (/\b\d*BH\b/.test(m))                                    return 'Bunkhouse';
  if (/\b\d*(DRL|DLR)\b/.test(m))                             return 'Double Rear Living';
  if (/\b\d*(MBS|MDS|MB)\b/.test(m))                         return 'Master Suite';
  if (/\b\d*(CK|QBC)\b/.test(m))                              return 'Corner Kitchen';
  if (/\b\d*(RBS|RBD)\b/.test(m))                             return 'Rear Bath Suite';
  if (/\b\d*(VFD|VIEW|VIEWX)\b/.test(m))                      return 'View/Panoramic';
  if (/\b\d*FAM\b/.test(m))                                   return 'Family Suite';
  if (/\b\d*SB\b/.test(m))                                    return 'Side Bath';
  if (/\b\d*(ZEN|ICE)\b/.test(m))                             return 'Open Concept';
  return '';
}

// Boolean filter fields used by applyFilterSpec
const BOOL_FILTER_FIELDS = ['dishwasher','fireplace','central_vacuum','off_grid_solar','third_ac','wd_installed','convection','loft','murphy_bed','kit_island','outdoor_kitchen','auto_level','solar_pkg','happi_jac','disc_brakes','theater_inst','walkin_shower','bunkroom','recliners','hideabed','on_demand_water','convection_oven','kit_pantry','kit_residential_fridge','power_awning','outdoor_tv','ceiling_fan','pullout_pantry','wd_prep_only','walkin_closet','theater_seat','desk','l_shaped_sofa','u_shaped_dinette','jackknife_sofa'];

function applyFilterSpec(spec, startList) {
  spec = spec || {};
  let list = startList ? startList.slice() : INVENTORY.slice();

  if (spec.features && spec.features.length) {
    list = list.filter(u => spec.features.every(f => (u.features || []).includes(f)));
  }
  if (spec.hitch) list = list.filter(u => u.hitch === spec.hitch);
  if (spec.type) list = list.filter(u => u.type === spec.type);
  if (spec.condition) list = list.filter(u => u.condition === spec.condition);

  for (const f of BOOL_FILTER_FIELDS) {
    if (spec[f] === true) list = list.filter(u => u[f] === true);
  }

  if (spec.kit_loc)  list = list.filter(u => u.kit_loc === spec.kit_loc);
  if (spec.bed_loc)  list = list.filter(u => u.bed_loc === spec.bed_loc);
  if (spec.bath_loc) list = list.filter(u => u.bath_loc === spec.bath_loc);

  if (spec.minPrice != null) list = list.filter(u => (u.priceNum || 0) >= spec.minPrice);
  if (spec.maxPrice != null) list = list.filter(u => (u.priceNum || 0) > 0 && u.priceNum <= spec.maxPrice);
  if (spec.minWt != null) list = list.filter(u => (u.wt || 0) >= spec.minWt);
  if (spec.maxWt != null) list = list.filter(u => (u.wt || 0) > 0 && u.wt <= spec.maxWt);
  if (spec.minLen != null) list = list.filter(u => (u.len || 0) >= spec.minLen);
  if (spec.maxLen != null) list = list.filter(u => (u.len || 0) > 0 && u.len <= spec.maxLen);
  if (spec.minSlp != null) list = list.filter(u => (u.slp || 0) >= spec.minSlp);
  if (spec.slidesEq != null) list = list.filter(u => u.sl === spec.slidesEq);
  if (spec.minSlides != null) list = list.filter(u => (u.sl || 0) >= spec.minSlides);
  if (spec.maxSlides != null) list = list.filter(u => (u.sl || 0) <= spec.maxSlides);
  if (spec.minBdrms != null) list = list.filter(u => (u.bdrms || 1) >= spec.minBdrms);
  if (spec.minBths != null) list = list.filter(u => (u.bths || 1) >= spec.minBths);
  if (spec.minBunks != null) list = list.filter(u => (u.bunks || 0) >= spec.minBunks);
  if (spec.minFridgeCuft != null) list = list.filter(u => (u.fridge_cuft || 0) >= spec.minFridgeCuft);
  if (spec.minGarage != null) list = list.filter(u => (u.garage_ft || 0) >= spec.minGarage);
  if (spec.elecAmp != null) list = list.filter(u => u.amp === spec.elecAmp);

  if (spec.stockEq) list = list.filter(u => u.stock === spec.stockEq);
  if (spec.modelContains) {
    const needle = String(spec.modelContains).toLowerCase();
    list = list.filter(u => (u.brandModel || '').toLowerCase().includes(needle));
  }
  return list;
}

function applySort(list, sortBy, sortDir) {
  if (!sortBy) return list;
  const dir = sortDir === 'desc' ? -1 : 1;
  return list.slice().sort((a, b) => {
    const aV = (a[sortBy] != null) ? a[sortBy] : (dir > 0 ? Infinity : -Infinity);
    const bV = (b[sortBy] != null) ? b[sortBy] : (dir > 0 ? Infinity : -Infinity);
    return (aV - bV) * dir;
  });
}

function renderCards(stocks) {
  const units = stocks.map(s => INVENTORY.find(u => u.stock === s)).filter(Boolean);
  if (!units.length) return '';

  const cardsHTML = units.map(u => {
    const searchUrl = u.detailUrl || `https://www.funtownrv.com/rv-search?s=true&lots=1695&q=${encodeURIComponent(u.stock)}`;
    const priceHTML = u.price === 'Call'
      ? `<div class="card-price call">Call for Price</div>`
      : `<div class="card-price">${u.price}</div>`;
    const photoHTML = u.photoUrl
      ? '<img src="' + u.photoUrl + '" alt="' + u.brandModel.replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=&quot;photo-placeholder&quot;><div class=&quot;icon&quot;>\u{1F690}</div></div>\'">'
      : '<div class="photo-placeholder"><div class="icon">🚐</div><div class="lbl">No photo available</div></div>';

    return `<div class="unit-card">
      <div class="card-photo">
        ${photoHTML}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-stock">#${u.stock}</div>
            <div class="card-year">${u.year}</div>
          </div>
          <div class="card-badges" style="text-align:right">
            <span class="badge ${u.condition === 'New' ? 'b-new' : 'b-used'}">${u.condition}</span>
          </div>
        </div>
        <div class="card-model">${u.brandModel}</div>
        <div class="card-badges">
          <span class="badge ${typeBadgeClass(u.type)}">${typeShort(u.type)}</span>
          ${u.layout ? `<span class="badge" style="background:rgba(255,166,87,.1);color:#ffa657;border:1px solid rgba(255,166,87,.3)">${u.layout}</span>` : ''}
        </div>
        ${priceHTML}
        <div class="card-actions">
          ${u.detailUrl ? `<button class="btn-action btn-view" onclick="showFloorplan('${u.stock}','${u.detailUrl}')">🗺️ Floor Plan</button>` : `<a class="btn-action btn-view" href="https://www.funtownrv.com/rv-search?s=true&lots=1695&q=${encodeURIComponent(u.stock)}" target="_blank">🔍 Search Unit</a>`}

  return `<div class="cards-row">${cardsHTML}</div>`;

function copyStock(btn, stock) {
  navigator.clipboard.writeText(stock).catch(() => {});
  btn.textContent = '✅ Copied!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '📋 Copy #' + stock;
    btn.classList.remove('copied');
  }, 1800);
}

  document.getElementById('fp-img').style.display = 'none';
  document.getElementById('fp-err').style.display = 'none';

  // Fetch floor plan via proxy
  fetch(`/api/floorplan?url=${encodeURIComponent(productUrl)}`)
    .then(r => r.json())
    .then(data => {
      if (data.floorplanUrl) {
        const img = document.getElementById('fp-img');
        img.onload = () => {
          document.getElementById('fp-spinner').style.display = 'none';
          img.style.display = 'block';
        };
        img.onerror = () => {
          document.getElementById('fp-spinner').style.display = 'none';
          document.getElementById('fp-err').style.display = 'block';
        };
        img.src = data.floorplanUrl;
      } else {
        document.getElementById('fp-spinner').style.display = 'none';
        document.getElementById('fp-err').style.display = 'block';
      }
    })
    .catch(() => {
      document.getElementById('fp-spinner').style.display = 'none';
      document.getElementById('fp-err').style.display = 'block';
    });
}

function closeFpModal() {
  const m = document.getElementById('fp-modal');
  if (m) m.style.display = 'none';
}

function addMessage(role, text, stocks = []) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  let inner = `<div class="bubble">${formatted}</div>`;
  if (stocks.length) inner += renderCards(stocks);

  div.innerHTML = inner;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM,
        messages: conversation.slice(-10)
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || '';

    // v8: parse JSON filter spec, execute deterministically
    const cleaned = reply.replace(/^\s*```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
    let parsed = null;
    try { parsed = JSON.parse(cleaned); }
    catch(e) {
      const mm = cleaned.match(/\{[\s\S]*\}/);
      if (mm) { try { parsed = JSON.parse(mm[0]); } catch(_){} }
    }

    let narrative, stocks = [];
    if (!parsed) {
      narrative = "I had trouble parsing that. Try rephrasing — or use plain terms (e.g. 'fifth wheel under 60k with a king bed').";
    } else {
      narrative = parsed.narrative || '';
      const filterSpec = parsed.filter || {};
      const sortBy = parsed.sortBy || null;
      const sortDir = parsed.sortDir || 'asc';
      const limit = parsed.limit || null;
      let list = parsed.noMatch === true ? [] : applyFilterSpec(filterSpec, INVENTORY);
      if (sortBy) list = applySort(list, sortBy, sortDir);
      if (limit) list = list.slice(0, limit);
      stocks = list.slice(0, 8).map(u => u.stock);  // chat UI shows up to 8 cards
    }

    removeTyping();
    addMessage('ai', narrative, stocks);
    conversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    addMessage('ai', '⚠️ Connection error: ' + err.message + '. Check your network and try again.');
  }

  btn.disabled = false;
  input.focus();
}

function ask(q) {
  document.getElementById('userInput').value = q;
  sendMsg();
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
const input = document.getElementById('userInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});

// ─── WELCOME ──────────────────────────────────────────────────────────────────
addMessage('ai', `👋 Hey! I've got **${INVENTORY.length} units** loaded from the Texarkana lot right now.\n\nTell me what your customer is looking for — budget, family size, type of RV, features — and I'll pull the best matches. You can also ask about a specific stock number.`);
</script>
