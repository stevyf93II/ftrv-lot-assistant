<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTRV Lot Assistant — Grid View (Texarkana)</title>
<style>
:root {
  --red: #c0392b;
  --red2: #8b0000;
  --dark: #0d1117;
  --mid: #161b22;
  --card: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --green: #3fb950;
  --gold: #f0b429;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --orange: #ffa657;
  --teal: #39d3c3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--dark);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, var(--red), var(--red2));
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
  position: sticky; top: 0; z-index: 50;
}
.hicon { font-size: 1.6rem; }
.htitle { flex: 1; }
.htitle h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: .3px; }
.htitle .sub { font-size: .72rem; opacity: .8; letter-spacing: .5px; }
.hbadge {
  background: rgba(255,255,255,.2);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: .75rem;
  font-weight: 700;
  white-space: nowrap;
}

/* CONTROLS */
.controls {
  background: var(--mid);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: sticky; top: 56px; z-index: 40;
}
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.row .label {
  font-size: .7rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  min-width: 70px;
}
#search {
  flex: 1;
  min-width: 220px;
  background: var(--dark);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: .9rem;
  outline: none;
}
#search:focus { border-color: var(--red); }
#sort {
  background: var(--dark);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: .85rem;
  cursor: pointer;
}
.pill {
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--dark);
  color: var(--muted);
  font-size: .78rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  user-select: none;
}
.pill:hover { color: var(--text); border-color: var(--red); }
.pill.active {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
  font-weight: 600;
}
#layoutSel {
  background: var(--dark);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 16px;
  padding: 6px 14px;
  font-size: .78rem;
  cursor: pointer;
}
#clearAll {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 16px;
  padding: 6px 14px;
  font-size: .78rem;
  cursor: pointer;
}
#clearAll:hover { color: var(--text); border-color: var(--red); }
.summary {
  font-size: .78rem;
  color: var(--muted);
  margin-left: auto;
  white-space: nowrap;
}
.summary b { color: var(--text); }

/* GRID */
#grid {
  padding: 18px 20px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  flex: 1;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .12s, border-color .12s, box-shadow .12s;
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--red);
  box-shadow: 0 8px 20px rgba(0,0,0,.4);
}
.thumb {
  aspect-ratio: 4 / 3;
  background: #0a0e14 linear-gradient(135deg, #1c2333, #0d1117);
  background-size: cover;
  background-position: center;
  position: relative;
  border-bottom: 1px solid var(--border);
}
.thumb.no-photo::after {
  content: "📷  no photo";
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  font-size: .8rem;
  letter-spacing: .5px;
}

.ai-reply {
  background: linear-gradient(135deg, rgba(192,57,43,.14), rgba(139,0,0,.08));
  border: 1px solid rgba(192,57,43,.45);
  border-radius: 12px;
  padding: 14px 16px;
  margin: 8px 12px 12px;
  font-size: .9rem;
  line-height: 1.55;
  color: var(--text);
}
.ai-conv { font-size: .92rem; }
.ai-conv strong { color: var(--gold); }
.ai-thinking { color: var(--muted); font-size: .85rem; display: flex; gap: 6px; align-items: center; }
.ai-thinking .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
.ai-thinking .dot:nth-child(2) { animation-delay: .2s; }
.ai-thinking .dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
.ai-error { color: #ff8a80; font-size: .85rem; background: rgba(255,82,82,.1); padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,82,82,.3); }


.smart-reply {
  background: linear-gradient(135deg, rgba(192,57,43,.12), rgba(139,0,0,.08));
  border: 1px solid rgba(192,57,43,.4);
  border-radius: 10px;
  padding: 12px 14px;
  margin: 0 0 14px;
  font-size: .82rem;
  line-height: 1.5;
}
.smart-reply h4 { font-size: .9rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.smart-reply .sr-criteria { color: var(--muted); font-size: .75rem; margin-bottom: 8px; }
.smart-reply .sr-list { display: flex; flex-direction: column; gap: 4px; }
.smart-reply .sr-item { color: var(--text); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: .76rem; }
.smart-reply .sr-item .sr-stock { color: var(--gold); font-weight: 700; }
.smart-reply .sr-item .sr-price { color: var(--green); font-weight: 700; margin-left: auto; }
.smart-reply .sr-item-row { display: flex; gap: 10px; align-items: baseline; }
.smart-reply .sr-empty { color: var(--muted); font-style: italic; }
.lw-line {
  font-size: .78rem;
  color: var(--muted);
  letter-spacing: .3px;
  margin: -2px 0 2px;
}
.cond-badge {
  position: absolute; top: 8px; left: 8px;
  font-size: .68rem; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: .3px;
}
.cond-badge.New { background: var(--green); color: #06200d; }
.cond-badge.Used { background: var(--gold); color: #2b1f00; }
.cond-badge.Pre-Owned { background: var(--gold); color: #2b1f00; }
.stock-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: .7rem; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  background: rgba(0,0,0,.7); color: #fff;
}
.body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.title {
  font-size: .9rem;
  font-weight: 600;
  line-height: 1.35;
}
.meta {
  display: flex; flex-wrap: wrap; gap: 6px;
  font-size: .7rem;
}
.tag {
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--mid);
  color: var(--muted);
  border: 1px solid var(--border);
}
.tag.bath { color: var(--blue); border-color: rgba(88,166,255,.3); }
.tag.layout { color: var(--purple); border-color: rgba(188,140,255,.3); }
.tag.type { color: var(--teal); border-color: rgba(57,211,195,.3); }
.price {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--gold);
  margin-top: auto;
}
.price.call { color: var(--muted); font-style: italic; font-size: .95rem; }
.actions { display: flex; gap: 6px; }
.btn {
  flex: 1;
  text-align: center;
  background: var(--red);
  color: #fff;
  text-decoration: none;
  padding: 8px;
  border-radius: 6px;
  font-size: .78rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: background .15s;
}
.btn:hover { background: var(--red2); }
.btn.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn.secondary:hover { color: var(--text); border-color: var(--red); }
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
/* Filter toggle button + collapsible panel */
.filter-toggle {
  background: var(--mid);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all .15s;
}
.filter-toggle:hover { border-color: var(--red); color: var(--red); }
.filter-toggle.open { background: var(--red); color: white; border-color: var(--red); }
.filter-toggle .caret { font-size: .65rem; transition: transform .2s; }
.filter-toggle.open .caret { transform: rotate(180deg); }

#filterPanel {
  display: none;
  padding: 10px 16px;
  background: var(--mid);
  border-bottom: 1px solid var(--border);
  flex-direction: column;
  gap: 8px;
}
#filterPanel.open { display: flex; }
#filterPanel .row { padding: 0; }
#filterPanel .label { font-size: .65rem; min-width: 70px; }

@media (max-width: 600px) {
  /* Compact header */
  header { padding: 8px 12px; gap: 8px; }
  .hicon { font-size: 1.3rem; }
  .htitle h1 { font-size: .92rem; line-height: 1.15; }
  .htitle .sub { font-size: .65rem; opacity: .7; }
  .hbadge { padding: 3px 9px; font-size: .65rem; }

  /* Sticky search row */
  .controls {
    padding: 8px 10px;
    position: sticky; top: 0; z-index: 50;
    background: var(--mid);
    border-bottom: 1px solid var(--border);
  }
  .controls .row { gap: 6px; padding: 0; }
  #search { font-size: 1rem; padding: 11px 12px; flex: 1; min-width: 0; }
  #sort { display: none; }

  #filterPanel { padding: 8px 12px; }
  #filterPanel .row { flex-wrap: wrap; }
  #filterPanel .label { width: 100%; min-width: auto; margin-bottom: 2px; }

  /* Single-column card grid */
  #grid { padding: 12px; gap: 12px; grid-template-columns: 1fr; }
  .ai-reply { margin: 8px 12px; padding: 12px 14px; font-size: .88rem; }
  .card .thumb { height: 180px; }
}
</style>

function getLayout(brandModel) {
  const m = brandModel.toUpperCase();
  // Check model suffix patterns
  if (/\b\d*FL\b/.test(m) || /FRONT.?LIV/i.test(m))         return 'Front Living';
  if (/\b\d*RL[BST]?\b/.test(m) || /REAR.?LIV/i.test(m))    return 'Rear Living';
  if (/\b\d*(RK|RKFB|RKS|RKT)\b/.test(m))                    return 'Rear Kitchen';
  if (/\b\d*(FK[DK]?|FKW)\b/.test(m))                        return 'Front Kitchen';
  if (/\b\d*(MK|MKT|MKS)\b/.test(m))                         return 'Mid Kitchen';
  if (/\b\d*(QUAD)\b/.test(m) || /4.?BEDROOM/i.test(m))      return 'Quad/4-Bedroom';
  if (/\b\d*(TB|TBH|3BH)\b/.test(m))                         return 'Triple Bunk';
  if (/\b\d*(DBH|DB[SL]?|DBLE)\b/.test(m))                   return 'Double Bunk';
  if (/\b\d*(BH[SLF]?|BHS|BHK|BHSL|BHKSE)\b/.test(m))       return 'Bunkhouse';
  if (/\b\d*BH\b/.test(m))                                    return 'Bunkhouse';
  if (/\b\d*(DRL|DLR)\b/.test(m))                             return 'Double Rear Living';
  if (/\b\d*(MBS|MDS|MB)\b/.test(m))                         return 'Master Suite';
  if (/\b\d*(CK|QBC)\b/.test(m))                              return 'Corner Kitchen';
  if (/\b\d*(RBS|RBD)\b/.test(m))                             return 'Rear Bath Suite';
  if (/\b\d*(VFD|VIEW|VIEWX)\b/.test(m))                      return 'View/Panoramic';
  if (/\b\d*FAM\b/.test(m))                                   return 'Family Suite';
  if (/\b\d*SB\b/.test(m))                                    return 'Side Bath';
  if (/\b\d*(ZEN|ICE)\b/.test(m))                             return 'Open Concept';
  return '';
}

const INVENTORY = RAW.map(r => {
  const parts = r.split('|');
  const [stock, year, type, condition, price] = parts;
  const brandModel = parts.slice(5, parts.length - 1).join('|');
  const rawPhoto = parts[parts.length - 1] || '';
  const photoUrl = rawPhoto || (FTRV_DATA[stock] && FTRV_DATA[stock].photoUrl) || '';
  const priceNum = price ? parseInt(price.replace(/[^0-9]/g,'')) || 0 : 0;
  const detailUrl = URL_MAP[stock] || null;
  const layout = getLayout(brandModel);
  const ext = FTRV_DATA[stock] || {};
  // Prefer scraped baths from features when available, fall back to BATHS lookup
  const baths = ext.baths != null ? ext.baths : (BATHS[stock] || 1);
  return {
    stock,
    year: parseInt(year)||0,
    type,
    condition,
    price: price || 'Call',
    priceNum,
    brandModel,
    photoUrl,
    detailUrl,
    layout,
    baths,
    features: ext.features || [],
    length_ft: ext.length_ft || null,
    dry_weight_lb: ext.dry_weight_lb || null,
    sleeps: ext.sleeps || null,
    slides: ext.slides != null ? ext.slides : null,
    fresh_gal: ext.fresh_gal || null,
    grey_gal: ext.grey_gal || null,
    black_gal: ext.black_gal || null,
    available_beds: ext.available_beds || '',
    ac_btu: ext.ac_btu || '',
    shower_size: ext.shower_size || '',
    ext_height: ext.ext_height || '',
    floorplanUrl: ext.floorplanUrl || '',
    vin: ext.vin || '',
    highlights: ext.highlights || [],
    fp_summary: ext.fp_summary || '',
    fp_blurb: ext.fp_blurb || ''
  };
});

document.getElementById('unitBadge').textContent = INVENTORY.length + ' units';
document.getElementById('totalCount').textContent = INVENTORY.length;

// (layout dropdown removed — AI handles layout filtering)

// Filter state
const state = { type: '', condition: '', q: '', sort: 'yearDesc' };

function render() {
  const q = state.q.trim().toLowerCase();
  let list = INVENTORY.filter(u => {
    if (state.type && u.type !== state.type) return false;
    if (state.condition && u.condition !== state.condition) return false;

    if (q) {
      const hay = (u.stock + ' ' + u.brandModel + ' ' + u.type + ' ' + u.year + ' ' + u.layout).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  // Sort
  switch (state.sort) {
    case 'priceAsc':  list.sort((a,b)=> (a.priceNum||9e9) - (b.priceNum||9e9)); break;
    case 'priceDesc': list.sort((a,b)=> (b.priceNum||0) - (a.priceNum||0)); break;
    case 'yearAsc':   list.sort((a,b)=> a.year - b.year); break;
    case 'yearDesc':  list.sort((a,b)=> b.year - a.year); break;
    case 'stock':     list.sort((a,b)=> a.stock.localeCompare(b.stock)); break;
  }

  document.getElementById('resultCount').textContent = list.length;
  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = '<div class="empty"><h2>No units match these filters</h2><div>Try clearing one or more filters above.</div></div>';
    return;
  }

  grid.innerHTML = list.map(u => {
    const condClass = u.condition.replace(/[^A-Za-z]/g,'');
    const thumbStyle = u.photoUrl
      ? `style="background-image:url('${u.photoUrl.replace(/'/g,"\\'")}')"`
      : '';
    const thumbCls = u.photoUrl ? 'thumb' : 'thumb no-photo';
    const priceCls = (u.priceNum > 0) ? 'price' : 'price call';
    // Sales-only minimal card: hero photo, year+model, stock #, condition, price, Floor Plan button.
    // All dense data (features, specs, weights, tanks) lives in INVENTORY for the AI to query.
    const fpBtn = (u.floorplanUrl || u.detailUrl)
      ? `<button class="btn" onclick="showFloorplan('${u.stock}')">Floor Plan</button>`
      : `<span class="btn secondary">No floor plan</span>`;
    const lwParts = [];
    if (u.length_ft) lwParts.push(u.length_ft + ' ft');
    if (u.dry_weight_lb) lwParts.push(u.dry_weight_lb.toLocaleString() + ' lb');
    if (u.sleeps) lwParts.push('sleeps ' + u.sleeps);
    const lwLine = lwParts.length ? `<div class="lw-line">${lwParts.join(' &middot; ')}</div>` : '';
    return `
      <div class="card">
        <div class="${thumbCls}" ${thumbStyle}>
          <span class="cond-badge ${condClass}">${u.condition}</span>
          <span class="stock-badge">#${u.stock}</span>
        </div>
        <div class="body">
          <div class="title">${u.year} ${u.brandModel}</div>
          ${lwLine}
          <div class="${priceCls}">${u.price}</div>
          <div class="actions">${fpBtn}</div>
        </div>
      </div>`;
  }).join('');
}

// Filter panel toggle (mobile + desktop both use it now)
const filterToggle = document.getElementById('filterToggle');
const filterPanel = document.getElementById('filterPanel');
filterToggle.addEventListener('click', () => {
  const open = filterPanel.classList.toggle('open');
  filterToggle.classList.toggle('open', open);
  filterToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
});

// Wire up pill clicks (delegated to all .pill elements)
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    const f = p.dataset.filter;
    const v = p.dataset.value;
    state[f] = v;
    document.querySelectorAll(`.pill[data-filter="${f}"]`).forEach(x => x.classList.toggle('active', x.dataset.value === v));
    render();
  });
});

// Smart search input: instant filter for stock #/short queries, debounced AI for wordy queries
let _searchDebounce;
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim();
  clearTimeout(_searchDebounce);
  if (!q) {
    state.q = '';
    if (typeof clearAiReply === 'function') clearAiReply();
    render();
    return;
  }
  // Looks like a stock # / brand fragment → instant filter (no AI)
  const isShortLookup = q.length <= 8 && /^[A-Za-z0-9-]+$/.test(q);
  if (isShortLookup) {
    state.q = q;
    if (typeof clearAiReply === 'function') clearAiReply();
    render();
    return;
  }
  // Wordy / natural-language query → don't literal-filter, debounce-trigger AI
  state.q = '';
  // Don't render() empty results — leave existing UI alone until AI returns
  _searchDebounce = setTimeout(() => {
    if (typeof askClaude === 'function') askClaude(q);
  }, 800);
});

// ─── Claude API integration via Render's /api/chat ────────────────────────────
const CLAUDE_ENDPOINT = 'https://ftrv-lot-assistant.onrender.com/api/chat';

function buildInvText() {
  return INVENTORY.map(u => {
    const parts = [u.stock, u.year, u.type, u.condition, u.price, u.brandModel];
    if (u.length_ft)     parts.push(u.length_ft + 'ft');
    if (u.dry_weight_lb) parts.push(u.dry_weight_lb + 'lb');
    if (u.sleeps)        parts.push('sleeps' + u.sleeps);
    if (u.slides != null) parts.push(u.slides + 'sl');
    parts.push(u.baths + 'bth');
    if (u.layout)        parts.push('layout:' + u.layout);
    if (u.available_beds) parts.push('beds:' + u.available_beds);
    if (u.features && u.features.length) parts.push('feat:[' + u.features.join(',') + ']');
    if (u.highlights && u.highlights.length) parts.push('hl:[' + u.highlights.join('; ') + ']');
    if (u.fp_summary) parts.push('fp:[' + u.fp_summary + ']');
    if (u.fp_blurb) parts.push('blurb:"' + u.fp_blurb + '"');
    return parts.join('|');
  }).join('\n');
}

const SYSTEM_TEMPLATE = "You are the FTRV Lot Assistant for Fun Town RV Texarkana. You help SALESPEOPLE find the right units for customers \u2014 internal sales tool, not customer-facing. Be terse, dense, extremely knowledgeable. No fluff.\n\nYour ONLY source is the lot inventory below. Do not reference units not listed.\n\nCURRENT INVENTORY (__N__ units) \u2014 pipe-delimited per unit:\nstock|year|type|condition|price|brand+model|Xft|Ylb|sleepsN|Nsl|baths_bth|layout:LAYOUT|beds:BEDS|feat:[features]\n\n__INVTEXT__\n\nRESPONSE FORMAT \u2014 strict:\n1. One short conversational paragraph (1-3 sentences max). Mention specific stock #s, prices, one or two reasons.\n2. End with this EXACT JSON on its own final line: {\"matches\":[\"STOCK1\",\"STOCK2\"]} \u2014 up to 8 best matches, ordered cheapest first. Use {\"matches\":[]} if nothing fits.\n\nINTERPRETATION RULES (apply liberally):\n- Weight (\"under 8000 lbs\", \"tow with F-150\", \"half-ton towable\") \u2192 lb field. Half-ton = under ~7500lb dry.\n- Length (\"under 25 ft\", \"fits in driveway\") \u2192 ft field.\n- Family / sleeps / kids / bunks \u2192 sleeps field + Bunkhouse feature.\n- Couples \u2192 Couples Coach - No Bunks feature.\n- Budget \u2014 flex 10-15% above max if matches are tight, but prefer under-budget first.\n- Layout (\"front living\", \"rear kitchen\") \u2192 layout field OR features.\n- Bath count: 1 / 1.5 / 2 \u2014 exact match.\n- \"Cheapest\", \"lowest price\" \u2192 sort cheapest first.\n- Toy hauler / 5th wheel / fifth wheel / travel trailer / destination \u2192 type.\n- Use your knowledge of RV model naming (252BH = bunkhouse, 38FL = front living) to fill gaps.\n- The feat:[] field includes BOTH Fun Town's filter taxonomy (Bunkhouse, King Bed, etc.) AND amenities pulled from each unit's Description tab: Fireplace, Dishwasher, Central Vacuum, Theater Seating, Solar Package, Off-Grid Solar, Residential Refrigerator, Convection Oven, Power Awning, Pass-Through Storage, Heated Underbelly, Outdoor Entertainment, Stainless Appliances, Smart TV, USB Ports, Walk-In Shower, Booth Dinette, U-Shaped Dinette, Hide-A-Bed, Electric Tilt Bed, On-Demand Water Heater, etc. Match these EXACTLY when customers ask.\n- The hl:[] field is each unit's headline highlights bullet list — use it as additional context for what the unit is best known for.\n- BRAND vs MODEL: salespeople and customers say MODEL names, not manufacturers. When the user types \"Sprinter\", \"Montana\", \"Durango\", \"Outback\", \"Bighorn\", \"Cherokee\", \"Brinkley\", etc., match against the brandModel field by checking if it CONTAINS the model word (case-insensitive). \"Sprinter\" matches \"Keystone RV Sprinter 3920DSL\". \"Montana\" matches \"Keystone RV Montana 3231CK\". When you DISPLAY units in your conversational response, use MODEL-ONLY naming: \"2025 Sprinter 3920DSL #220246\" NOT \"2025 Keystone RV Sprinter 3920DSL\". Drop the manufacturer prefix (Keystone RV, Forest River RV, KZ, etc.) when speaking — that matches how a salesperson talks.\n- DESTINATION TRAILER REAR: many destination trailers (look for \"Veranda\", \"Park\", \"Cottage\", \"Grand Lodge\" in brandModel) have a REAR PORCH/DECK with an outdoor kitchen, sink, fireplace and seating. These are OUTDOOR areas, NOT a rear bathroom. The rear porch can have plumbing fixtures (outdoor sink, outdoor cooktop) that LOOK like a bathroom in vision extraction. Trust the fp:[] bathloc field for actual bathroom location. If bathloc says \"mid\" and a unit has type Destination Trailer, the rear is almost certainly a porch — do NOT call it a rear bath.\n- MARKETING ADJECTIVES ARE NEVER SIZE SIGNALS. Words like \"Spacious\", \"Luxurious\", \"Master Suite\", \"Spa-Like\", \"Grand\", \"Full\" (as in \"Full Bath\"), \"Oversized\", \"Walk-in\" that appear in hl:[] highlights, blurb, or feat:[] mean NOTHING about actual size. Every brochure says \"spacious\". Ignore them entirely. The ONLY size data is fp:[].\n- LARGEST BATHROOM ranking: (1) Filter to units with bathloc:front OR bathloc:rear — these are the only candidates for \"largest bath\". bathloc:mid and bathloc:walk-thru are NEVER the biggest bath, regardless of fixture count.\n(2) Within front/rear, rank by: vanity:dual sink first, then count of bathx extras (linen, dresser, drawers, skylight). \n(3) Units with feat:[Two Full Baths] go LAST in the result list. Two baths = two SMALLER baths split, not one big one. Mention them at the end as \"these have two baths if dual is what they want\" but never lead with them for \"biggest bath\".\n- LARGEST CLOSET ranking: When the user says \"closet\", they mean the BEDROOM CLOSET. Do not ask them to clarify — just answer. \n(1) FIRST list units with bathloc:front (in a fifth wheel especially). Front bath = master suite = the biggest closet on the lot. Always lead the response with these.\n(2) Then add units with bathloc:rear plus rich bedstor (multiple wardrobes + dresser + drawers + storage underneath).\n(3) Then ample-storage flag from fp:[].\n(4) Explicit \"walk-in\" or \"WIC\" callouts in bedstor still trump the others when present.\n- SIZE QUESTIONS: For ANY question about how big a bathroom, closet, kitchen, bedroom, or living area is — and any \"biggest X\" / \"largest X\" / \"most storage\" comparison — your ONLY source of truth is the fp:[] field. The hl:[] highlights, blurb prose, and feat:[] tags contain MARKETING LANGUAGE that overstates size: a unit may say \"walk-in closet\" in highlights when the actual closet is a small cubby, or \"walk-in shower\" when the shower is a 30x36 corner unit. DO NOT use hl, blurb, or feat tags as evidence of physical size. Only judge size from fp:[] structural signals (location, fixture count, room layout from the floor plan drawing).\n- CLOSET vs WARDROBE: in fp:[] the bedstor token lists items like \"wardrobe\", \"OHC\", \"drawers\". A true walk-in closet only exists when bedstor explicitly contains \"walk-in\" or \"WIC\". If neither token is present, the unit has standard wardrobe storage NOT a walk-in closet — even if a marketing bullet claims otherwise. Rank \"biggest closet\" by: explicit walk-in callout > count of distinct bedstor items > size of master bedroom inferred from bedloc.\n- The fp:[] field is a structured floor-plan extraction with these tokens: bedloc (front/rear/mid), bed (size+type), bedstor (storage list), bathloc (front/rear/mid/walk-thru/split), shower (type+dims), vanity (single/dual sink), bathx (extras like linen/skylight/dresser), fridge, kapp (kitchen appliances), pantry, island, dinette, seating, tv, fireplace, awning, outdoor-kitchen/tv, pass-thru, bunk, biggest, ample-storage, compact.\n- BATHROOM SIZE — IGNORE the term \"walk-in shower\" as a size signal. Almost every RV shower is technically walk-in; it tells you nothing. Instead use:\n  1. bathloc:front in a fifth wheel = the master bath, typically LARGE/LUXURY.\n  2. bathloc:rear in any unit = usually a SUBSTANTIAL full bath with most fixtures.\n  3. bathloc:mid or walk-thru = often COMPACT pass-through bath.\n  4. Fixture count: vanity:dual sink + bathx including dresser/drawers/multiple linen = LARGE. vanity:single sink + minimal extras = SMALL/MEDIUM.\n  5. When a unit has BOTH a bathroom-and-a-half AND a Two Full Baths feature, the front/master is the big one.\n- CLOSET SIZE — bedstor with multiple wardrobes + dresser + drawers + storage underneath = walk-in or large closet. Just \"wardrobe\" alone = standard. Use the count and variety of bedstor entries.\n- ROOM SIZE COMPARISONS — for \"biggest bathroom/closet/kitchen\" queries, combine bathloc/bedloc + fixture count + the biggest:* signal. Don't rely on any single token.\n- The blurb:\"...\" field is a 1-sentence sales-floor description of each unit's standout features.\n\nAlways include the matches JSON line \u2014 the UI parses it for cards.";

let chatInflight = false;

async function askClaude(userQuery) {
  if (chatInflight) return;
  chatInflight = true;
  const replyEl = document.getElementById('aiReply');
  const grid = document.getElementById('grid');
  replyEl.style.display = 'block';
  replyEl.innerHTML = '<div class="ai-thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span> <span id="thinkLabel">Thinking...</span></div>';
  // After 8s, change message so user knows Render may be cold-starting
  setTimeout(() => { const lbl = document.getElementById('thinkLabel'); if (lbl) lbl.textContent = 'Waking up the server (free tier sleeps after 15 min idle)...'; }, 8000);
  grid.innerHTML = '';
  const invText = buildInvText();
  const sys = SYSTEM_TEMPLATE.replace('__N__', INVENTORY.length).replace('__INVTEXT__', invText);
  try {
    const res = await fetch(CLAUDE_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: [{type: 'text', text: sys, cache_control: {type: 'ephemeral'}}],
        messages: [{role: 'user', content: userQuery}]
      })
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error('API ' + res.status + ': ' + errText.slice(0, 200));
    }
    const data = await res.json();
    const reply = (data.content && data.content[0] && data.content[0].text) || '';
    const m = reply.match(/\{\s*"matches"\s*:\s*\[(.*?)\]\s*\}/);
    let matches = [];
    if (m) {
      try { matches = JSON.parse('[' + m[1] + ']'); } catch(e) { matches = []; }
    }
    const conv = reply.replace(/\{\s*"matches"[\s\S]*\}\s*$/, '').trim();
    renderClaudeReply(conv, matches);
  } catch (e) {
    replyEl.innerHTML = '<div class="ai-error"><strong>Couldn\'t reach Claude.</strong> ' + (e.message || e) + '<br><span style="opacity:.6;font-size:.75rem">Render free tier sleeps after idle \u2014 first request takes 50s+.</span></div>';
    grid.innerHTML = '';
  } finally {
    chatInflight = false;
  }
}

function renderClaudeReply(conv, matches) {
  const replyEl = document.getElementById('aiReply');
  const grid = document.getElementById('grid');
  const units = matches.map(s => INVENTORY.find(u => u.stock === s)).filter(Boolean);
  units.sort((a,b) => (a.priceNum || 999999) - (b.priceNum || 999999));
  const top = units.map(u =>
    '<div class="sr-item-row"><span class="sr-item"><span class="sr-stock">#' + u.stock + '</span> &middot; ' + u.year + ' ' + u.brandModel + '</span><span class="sr-price">' + u.price + '</span></div>'
  ).join('');
  replyEl.innerHTML = '<div class="ai-conv">' + conv.replace(/\n/g,'<br>') + '</div>' + (units.length ? '<div class="sr-list" style="margin-top:10px">' + top + '</div>' : '');
  if (units.length) {
    grid.innerHTML = units.map(u => {
      const condClass = u.condition.replace(/[^A-Za-z]/g,'');
      const thumbStyle = u.photoUrl ? 'style="background-image:url(\'' + u.photoUrl.replace(/'/g,"\\'") + '\')"' : '';
      const thumbCls = u.photoUrl ? 'thumb' : 'thumb no-photo';
      const priceCls = (u.priceNum > 0) ? 'price' : 'price call';
      const fpBtn = (u.floorplanUrl || u.detailUrl) ? '<button class="btn" onclick="showFloorplan(\'' + u.stock + '\')">Floor Plan</button>' : '<span class="btn secondary">No floor plan</span>';
      const lwParts = [];
      if (u.length_ft) lwParts.push(u.length_ft + ' ft');
      if (u.dry_weight_lb) lwParts.push(u.dry_weight_lb.toLocaleString() + ' lb');
      if (u.sleeps) lwParts.push('sleeps ' + u.sleeps);
      const lwLine = lwParts.length ? '<div class="lw-line">' + lwParts.join(' &middot; ') + '</div>' : '';
      return '<div class="card"><div class="' + thumbCls + '" ' + thumbStyle + '><span class="cond-badge ' + condClass + '">' + u.condition + '</span><span class="stock-badge">#' + u.stock + '</span></div><div class="body"><div class="title">' + u.year + ' ' + u.brandModel + '</div>' + lwLine + '<div class="' + priceCls + '">' + u.price + '</div><div class="actions">' + fpBtn + '</div></div></div>';
    }).join('');
  } else {
    grid.innerHTML = '<div class="empty"><h2>No matches</h2><div>Try rephrasing.</div></div>';
  }
  document.getElementById('resultCount').textContent = units.length;
}

// Enter on search box → ask Claude. Plain typing keeps existing literal filter.
const _searchEl = document.getElementById('search');
_searchEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const q = _searchEl.value.trim();
    if (q) askClaude(q);
  }
});

function clearAiReply() {
  const r = document.getElementById('aiReply');
  if (r) { r.style.display = 'none'; r.innerHTML = ''; }
}
// (input handler consolidated above)
const _clearBtn = document.getElementById('clearAll');
if (_clearBtn) _clearBtn.addEventListener('click', clearAiReply);

document.getElementById('sort').addEventListener('change', e => { state.sort = e.target.value; render(); });

document.getElementById('clearAll').addEventListener('click', () => {
  state.type = state.condition = state.q = '';
  state.sort = 'yearDesc';
  document.getElementById('search').value = '';
  document.getElementById('sort').value = 'yearDesc';
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.value === ''));
  clearAiReply();
  render();
});

render();

// ─── FLOOR PLAN MODAL (uses cached floorplanUrl from FTRV_DATA) ───────────────
function showFloorplan(stock) {
  const u = INVENTORY.find(x => x.stock === stock);
  if (!u) return;
  let modal = document.getElementById('fp-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'fp-modal';
    modal.style.cssText = 'display:flex;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center';
    modal.innerHTML = `
      <div onclick="closeFpModal()" style="position:absolute;inset:0;background:rgba(0,0,0,.78)"></div>
      <div style="position:relative;background:#1c2333;border:1px solid #30363d;border-radius:12px;width:min(700px,95vw);max-height:92vh;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
          <span id="fp-title" style="font-weight:700;font-size:1rem;color:#e6edf3"></span>
          <button onclick="closeFpModal()" style="background:none;border:none;color:#8b949e;font-size:1.6rem;cursor:pointer;line-height:1">&times;</button>
        </div>
        <div id="fp-body" style="text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center">
          <div id="fp-spinner" style="color:#8b949e">Loading floor plan...</div>
          <img id="fp-img" style="display:none;max-width:100%;max-height:72vh;border-radius:6px" />
          <div id="fp-err" style="display:none;color:#8b949e">Floor plan not available. <a id="fp-fallback" target="_blank" style="color:#58a6ff">Open listing</a></div>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }
  modal.style.display = 'flex';
  document.getElementById('fp-title').textContent = `#${u.stock} - ${u.year} ${u.brandModel}`;
  const spinner = document.getElementById('fp-spinner');
  const img = document.getElementById('fp-img');
  const err = document.getElementById('fp-err');
  spinner.style.display = 'block'; img.style.display = 'none'; err.style.display = 'none';
  document.getElementById('fp-fallback').href = u.detailUrl || '#';
  if (u.floorplanUrl) {
    img.onload = () => { spinner.style.display='none'; img.style.display='block'; };
    img.onerror = () => { spinner.style.display='none'; err.style.display='block'; };
    img.src = u.floorplanUrl;
  } else {
    spinner.style.display='none'; err.style.display='block';
  }
}
function closeFpModal(){ const m=document.getElementById('fp-modal'); if(m) m.style.display='none'; }
</script>
